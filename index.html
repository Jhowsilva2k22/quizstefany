<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico Estratégico | Stefany Mello</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ============================================================
       DESIGN SYSTEM — Luxury Dark
    ============================================================ */
    :root {
      --black:       #080808;
      --card:        #111111;
      --card-2:      #161616;
      --border:      #1e1e1e;
      --border-2:    #2a2a2a;
      --gold:        #C9A96E;
      --gold-light:  #DEC08A;
      --gold-dim:    rgba(201, 169, 110, 0.12);
      --gold-dim2:   rgba(201, 169, 110, 0.06);
      --white:       #F0EDE8;
      --gray:        #777777;
      --gray-2:      #AAAAAA;
      --red:         #C85C5C;

      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-out: cubic-bezier(0, 0, 0.2, 1);
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
